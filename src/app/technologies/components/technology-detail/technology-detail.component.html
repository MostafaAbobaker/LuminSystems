<app-loader *ngIf="loaded"></app-loader>
<app-page-header 
  [headerTitle]="technologyName"
  [headerImage]="'technology/hedaer.png'"
  ></app-page-header>
  
<section class="all-service-page">
  <div class="container ">
    <!-- breadcrumb -->
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li routerLink="" class="breadcrumb-item ">
          <svg xmlns="http://www.w3.org/2000/svg"  height="23.016" viewBox="0 0 24 23.016">
            <path id="Home_icon_SVG" data-name="Home icon_SVG" d="M23.728,21.082,13.959,11.25l-.039-.037a2.81,2.81,0,0,0-3.749-.008l-.039.037L.275,21.079A.938.938,0,0,0,1.6,22.406l.744-.743v8.095a3.754,3.754,0,0,0,3.75,3.75H9.469a.937.937,0,0,0,.937-.937V24.93h3.281v7.641a.937.937,0,0,0,.938.938h3.281a3.754,3.754,0,0,0,3.75-3.75.937.937,0,1,0-1.875,0,1.877,1.877,0,0,1-1.875,1.875H15.563V23.993a.937.937,0,0,0-.937-.937H9.469a.937.937,0,0,0-.937.938v7.641H6.094a1.877,1.877,0,0,1-1.875-1.875V19.821q0-.014,0-.028l7.217-7.2a.937.937,0,0,1,1.216,0l7.13,7.177v5.3a.937.937,0,1,0,1.875,0V21.658l.741.746a.937.937,0,0,0,1.33-1.322Z" transform="translate(0 -10.492)" fill="#0055b8"/>
          </svg>
          <a >Home</a>
        </li>        
        <li class="breadcrumb-item "routerLink="/technologies" ><a>technologies</a></li>
        <li class="breadcrumb-item active" aria-current="page" >{{technologyName}}</li>
      </ol>
    </nav>
  </div>   
</section>

<section class="facts service__category service__subcategory pb-5">
  <div class="bg-light-section">
    <div class="container">
      <div class="row facts__content-container service__category__image">
          <div class="col-lg-6 d-flex justify-content-center animate__animated animate__fadeIn animate__delay-1s">
              <img class="img-fluid" [src]="technologyDetail?.technologyImage">
          </div>
          <div class="col-lg-6 ">
              <div class="facts__content">
                  <h2 class="service__main__title">{{technologyDetail?.technologyDetailHeadingTitle}} <span class="technology__main_title--sufix">{{technologyDetail?.technologyDetailHeadingSufixTitle}}</span> </h2>
                  <p class="line-clamp-7">{{technologyDetail?.technologyDetailContent}}</p>
              </div>

          </div>
      </div>
    </div>
  </div>
  <div class="our-facts sub__category__titles technology__subTitle">
      <div class="overlay-sperator">
          <img src="../../../../assets/img/services/BottomCurvedShape.svg">
          <div class="section-heading">
              <h2>Modules</h2>
          </div>
      </div>
  </div>
</section>
<section class="service__subcategory partners  ">
  <div class="container">
    <div class="parteners--overlay technologies__overlay">
      <div class="tab-content " id="pills-tabContent">
        <div class="container">
          <div class="row d-flex justify-content-center">
            <div *ngFor="let item of technologyDetail?.technologyUsedList index as i" class="col-lg-3 col-6 d-flex justify-content-center align-items-center mb-4">
                <div class="logo-container technologies__images">
                    <img [src]="item.technologyImg">
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>    
  </div>
</section>


<div class="section-seprator bg-technology">
  <img src="../../../../assets/img/home/TopCurves.svg">
</div>
